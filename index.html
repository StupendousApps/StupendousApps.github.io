<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StupendousApps</title>
    <meta
      name="description"
      content="StupendousApps makes native macOS apps, including Dotty: Planner Maker."
    >
    <meta
      name="keywords"
      content="StupendousApps, macOS apps, Mac apps, native macOS software, Dotty, planner app, productivity app"
    >
    <meta name="author" content="StupendousApps">
    <meta name="robots" content="index,follow">
    <meta name="theme-color" content="#11161d">
    <link rel="canonical" href="https://stupendousapps.com/">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="StupendousApps">
    <meta property="og:title" content="StupendousApps">
    <meta
      property="og:description"
      content="We make native macOS apps. Explore Dotty: Planner Maker from StupendousApps."
    >
    <meta property="og:url" content="https://stupendousapps.com/">
    <meta property="og:image" content="https://stupendousapps.com/images/zipic/stupendous-logo.png">
    <meta property="og:image:alt" content="StupendousApps logo">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="StupendousApps">
    <meta
      name="twitter:description"
      content="We make native macOS apps. Explore Dotty: Planner Maker from StupendousApps."
    >
    <meta name="twitter:image" content="https://stupendousapps.com/images/zipic/stupendous-logo.png">
    <style>
      :root {
        color-scheme: dark;
        --text: #f6f2ea;
        --muted: rgba(246, 242, 234, 0.8);
        --panel: linear-gradient(180deg, rgba(54, 65, 81, 0.52), rgba(28, 33, 44, 0.62));
        --panel-border: rgba(255, 255, 255, 0.14);
        --panel-shadow: rgba(9, 11, 16, 0.24);
        --ink: #f5f7fb;
        --subtle-ink: rgba(229, 235, 245, 0.76);
        --link: #9fc2ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        font-family:
          "SF Pro Display",
          "SF Pro Text",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        background:
          linear-gradient(to top, rgba(13, 9, 5, 0.45), rgba(13, 9, 5, 0.08) 24%, rgba(13, 9, 5, 0.1) 100%),
          url("images/zipic/marek-piwnicki-r_wAAUeXDcQ-unsplash.jpg") center center / cover no-repeat;
      }

      .page {
        position: relative;
        min-height: 100vh;
        padding: 28px 32px 40px;
      }

      .brand-mark {
        display: block;
        width: min(22vw, 278px);
        min-width: 152px;
        margin: 0 auto;
        filter: drop-shadow(0 12px 22px rgba(0, 0, 0, 0.34));
      }

      .work {
        position: absolute;
        left: 50%;
        top: clamp(286px, 36vh, 372px);
        width: min(382px, calc(100vw - 64px));
        transform: translateX(-50%);
      }

      .work-label {
        margin: 0 0 18px;
        color: rgba(255, 255, 255, 0.94);
        font-size: clamp(1.2rem, 1.8vw, 1.45rem);
        font-weight: 500;
        letter-spacing: -0.02em;
        text-align: center;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.28);
      }

      .project-card {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 18px;
        align-items: center;
        padding: 22px 24px;
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        color: var(--ink);
        text-decoration: none;
        background: var(--panel);
        backdrop-filter: blur(22px) saturate(135%);
        -webkit-backdrop-filter: blur(22px) saturate(135%);
        box-shadow:
          0 16px 38px var(--panel-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      }

      .project-card:hover,
      .project-card:focus-visible {
        transform: translateY(-1px);
        box-shadow:
          0 18px 44px rgba(9, 11, 16, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          inset 0 -1px 0 rgba(255, 255, 255, 0.08);
      }

      .project-card:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.85);
        outline-offset: 4px;
      }

      .dotty-logo {
        width: 92px;
        height: 92px;
        border-radius: 22px;
        display: block;
      }

      .project-title {
        margin: 0 0 6px;
        font-size: 1.08rem;
        font-weight: 590;
        letter-spacing: -0.02em;
      }

      .project-copy {
        margin: 0 0 10px;
        color: var(--subtle-ink);
        font-size: 1rem;
        line-height: 1.35;
      }

      .project-link {
        color: var(--link);
        font-size: 0.86rem;
        font-weight: 400;
      }

      .photo-credit {
        position: absolute;
        right: 30px;
        bottom: 22px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.8rem;
        line-height: 1.3;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.38);
      }

      .photo-credit a {
        color: inherit;
      }

      @media (max-width: 680px) {
        .page {
          padding: 24px 20px 28px;
        }

        .brand-mark {
          width: 132px;
          margin-top: 2px;
        }

        .work {
          left: 50%;
          right: auto;
          top: 244px;
          width: auto;
          transform: translateX(-50%);
        }

        .photo-credit {
          right: 18px;
          bottom: 14px;
          font-size: 0.74rem;
        }

        .work-label {
          margin-bottom: 14px;
        }

        .project-card {
          grid-template-columns: 76px 1fr;
          gap: 14px;
          padding: 18px;
          border-radius: 22px;
        }

        .dotty-logo {
          width: 76px;
          height: 76px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <img
        class="brand-mark"
        src="images/zipic/stupendous-logo.png"
        alt="StupendousApps logo for a company making native macOS apps"
      >

      <section class="work" aria-labelledby="our-work-title">
        <h1 class="work-label" id="our-work-title">Our work:</h1>

        <a class="project-card" href="https://dotty.app" aria-label="Visit Dotty website">
          <img
            class="dotty-logo"
            src="images/zipic/dotty-logo-resized.png"
            alt="Dotty app icon for Dotty: Planner Maker, a native macOS planning app"
          >

          <div>
            <p class="project-title">Dotty: Planner Maker</p>
            <p class="project-copy">Lay out your system</p>
            <span class="project-link">Visit Site</span>
          </div>
        </a>
      </section>

      <p class="photo-credit">
        Photo by
        <a href="https://unsplash.com/photos/a-field-with-a-mountain-in-the-background-r_wAAUeXDcQ">Marek Piwnicki</a>
        on
        <a href="https://unsplash.com">Unsplash</a>
      </p>
    </main>
  </body>
</html>
